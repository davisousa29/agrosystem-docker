services:

  # ── Nginx — proxy reverso ────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: agro_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - backend
    networks:
      - agro_network
    restart: unless-stopped

  # ── Laravel — API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: agro_backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend:/var/www/html
      - vendor_cache:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agro_network
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agro_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agro_network
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agro_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agro_network
    restart: unless-stopped

networks:
  agro_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  vendor_cache:
